{% extends 'base.html' %}

{% block body %}


<div class="container"><br>
    <div class="row">
    {% for i in film_list %}
        <div class="col-md-3" style="padding-bottom:10px">
            <div class="card" style="height:600px" >
  <img src="{{i.img.url}}" class="card-img-top" alt="Card image cap" width=200px height=200px>
  <div class="card-body">
    <h5 class="card-title">{{i.name}}</h5>
    <p class="card-text">{{i.desc}}</p>
    <a href="{% url 'film:detail' i.id %}" class="btn btn-primary">More about</a>
  `
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
