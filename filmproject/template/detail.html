{% extends 'base.html' %}
{% block body %}
<div class="container">
    <div class="row">
        <div class="col-md-6">
            <img src="{{film.img.url}}" width="300" height="300">
        </div>
        <div class="col-md-6">
            <h2>{{film.name}}</h2>
            <h5>{{film.desc}}</h5>
            <h6>{{film.year}}</h6>
            <a class="btn btn-warning" href="{% url 'film:update' film.id %}">update</a>
            <a class="btn btn-danger" href="{% url 'film:delete' film.id %}">delete</a>
        </div>
    </div>
</div>
{% endblock %}
