{% extends 'base.html' %}
{% block content %}
<div class="container-fluid">
    <div class="row">
        <div class="col-md-12">
            <div class="banner">
                <div class="banner-text">
                    <h1>TODO</h1>
                </div>
            </div>
        </div>
    </div>
</div>


<div class="container">
    <div class="row">
        <div class="col-md-6">
        <form method="POST" class="p-3 shadow">
             {% csrf_token %}
                <div class="form-group">
                   <input type="text"  class="form-control" name="task" placeholder="Taskname">
                     </div>
                        <div class="form-group">
                         <input type="text"  class="form-control" name="priority" placeholder="Priority">
                            </div>
                             <input type="DATE"  class="form-control" name="date" placeholder="Enter your Date">

                              <input type="submit" class="btn btn-success" >
                                </form>
        </div>
       <div class="col-md-6">
           <h4> Task to be Completed</h4>
           {% for i in tasks %}
          <div class="shadow card">
            <div class="card-body">
                <div class="card-title">
                    <h5 class="card-title">{{i.name}}</h5>
                    <p><b>{{i.priority}}</b></p>
                    <p><b>{{i.date}}</b></p>
                    <a class="btn btn-danger" href="{% url 'delete' i.id %}">Done</a>
                    <a class="btn bt-success" href="{% url 'update' i.id %}">Update</a>

                    </div>
            </div>
          </div>
           <br>
           {% endfor %}
        </div>
   </div>
</div>

{% endblock %}
